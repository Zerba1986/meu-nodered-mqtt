[supervisord]
  nodaemon=true
    logfile=/dev/stdout
    logfile_maxbytes=0

    [program:mosquitto]
    command=/usr/sbin/mosquitto -c /etc/mosquitto/mosquitto.conf
    autostart=true
    autorestart=true
    stderr_logfile=/dev/stderr
    stderr_logfile_maxbytes=0
    stdout_logfile=/dev/stdout
    stdout_logfile_maxbytes=0
    priority=1

    [program:nodered]
    command=node-red --userDir /data
    autostart=true
    autorestart=true
    stderr_logfile=/dev/stderr
    stderr_logfile_maxbytes=0
    stdout_logfile=/dev/stdout
    stdout_logfile_maxbytes=0
    priority=2
    environment=PORT="%(ENV_PORT)s"
    
